name: Bug Report
description: Report a bug
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please complete all required fields before submitting.

  - type: input
    id: summary
    attributes:
      label: Bug Summary
      placeholder: Login button does not respond
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
        - P4
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Chrome 137 / Windows 11

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the application
        2. Login
        3. Click Login button
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Include logs or links if needed.